<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security System - Unlocked</title>
    <style>
        :root {
            --success: #00ff00;
            --danger: #ff3333;
            --bg: #0a0a0a;
        }
        body {
            background-color: var(--bg);
            color: var(--success);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .status-circle {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 4px solid var(--success);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.3);
            animation: unlock-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            margin-bottom: 40px;
        }
        .status-circle svg {
            width: 80px;
            height: 80px;
            fill: var(--success);
        }
        .message {
            font-size: 36px;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 15px var(--success);
            margin-bottom: 60px;
            text-align: center;
        }
        .lock-btn {
            background: transparent;
            color: var(--danger);
            border: 2px solid var(--danger);
            padding: 18px 45px;
            font-size: 22px;
            font-family: inherit;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.2);
            border-radius: 4px;
        }
        .lock-btn:hover {
            background: var(--danger);
            color: #fff;
            box-shadow: 0 0 35px rgba(255, 51, 51, 0.6);
            transform: translateY(-2px);
        }
        .lock-btn:active {
            transform: translateY(2px);
        }
        @keyframes unlock-pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="status-circle">
        <svg viewBox="0 0 24 24">
            <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6h2c0-1.66 1.34-3 3-3s3 1.34 3 3v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm0 12H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/>
        </svg>
    </div>
    
    <div class="message" id="welcome-message">ACCESS GRANTED</div>

    <button class="lock-btn" onclick="lockDoor()">Engage Manual Lock</button>

    <script>
        // Fetch the recognized user's name to personalize the screen
        fetch('/status')
            .then(response => response.json())
            .then(data => {
                if(data.user && data.user !== "Unknown") {
                    document.getElementById('welcome-message').innerText = "ACCESS GRANTED\n" + data.user;
                }
            })
            .catch(error => console.error('Error fetching user:', error));

        function lockDoor() {
            // Call the Python backend to lock the hardware and reset the state
            fetch('/lock')
                .then(response => response.json())
                .then(data => {
                    if (data.result === "success") {
                        window.location.href = "/";
                    }
                })
                .catch(error => console.error('Error locking door:', error));
        }
    </script>
</body>
</html>
